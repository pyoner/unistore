packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@types/json-pointer": ^1.0.34
  "@types/node": ^24
  json-pointer: ^0.6.2
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
